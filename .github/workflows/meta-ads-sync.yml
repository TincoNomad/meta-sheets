name: Meta Ads → Google Sheets Sync

on:
  schedule:
    # 12:00 UTC = 7:00 AM Peru (UTC-5)
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      test_sheet:
        description: "Write a test row to verify sheet access"
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -q -r requirements.txt
      - name: Write Google credentials file
        run: |
          cat > google-creds.json << 'EOF'
          ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          EOF
      - run: python main.py ${{ inputs.test_sheet && '--test-sheet' || '' }}
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_FILE: google-creds.json
